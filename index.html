<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrippWeb</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    h1 {
      margin-bottom: 16px;
      font-size: 2rem;
    }
    p {
      margin: 8px 0;
      font-size: 1.1rem;
      max-width: 560px;
      text-align: center;
    }
    .block {
      width: 80px;
      height: 80px;
      background: #ff0044;
      animation: spin 2s linear infinite;
      margin-top: 24px;
      border-radius: 12px;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <iframe
    src="https://www.youtube.com/embed/-QgjcJVcO7k?autoplay=1&loop=1&playlist=-QgjcJVcO7k&controls=0"
    title="Background audio"
    width="0"
    height="0"
    allow="autoplay; encrypted-media"
    style="border:0; position:absolute; left:-9999px;"
  ></iframe>
  <h1>Welcome to the TrippWeb!</h1>
  <p>This is a simple web page where I try to code stuff like this!</p>
  <div class="block"></div>
</body>
</html>
